<div class="home" id="home"  >
<!--  [ngClass]="{'tema-escuro': escuro, 'tema-claro': !escuro}"-->
  <header class="header-perso">
    <div class="nao-homecard">
    <div class="logo-container">
      <img src="RoomMaker.png" alt="RoomMaker">
    </div>
    <div>
      <div class="form-switch mudar-tema">
        @if(!escuro) {
          <label class="form-check-label" >Tema Claro</label>
          <input class="form-check-input" type="checkbox" role="switch"  (click)="changeTheme()">
          }@else{
          <label class="form-check-label" >Tema Escuro</label>
          <input class="form-check-input" type="checkbox" role="switch" (click)="changeTheme()" checked>
          }
      </div>
    </div>
    </div>
    <div class="  homecard">
      @if (username != null) {
        <div class="d-flex flex-column align-items-center">
          <p>Olá, {{username}}</p>
          <!-- [CANCELADO] alterarUsername - username é usado como chave em todas as coleções do MongoDB,
               atualizar exigiria cascade update manual em salas, chats, jogos, etc.
          @if (!editandoUsername) {
            <div class="d-flex align-items-center gap-2">
              <p style="margin:0">Olá, {{username}}</p>
              <button class="btn btn-sm" style="padding:2px 5px; font-size:14px; background:none; border:none; cursor:pointer; opacity:0.7;"
                title="Alterar nickname" (click)="abrirEditarUsername()">✏️</button>
            </div>
          } @else {
            <div class="d-flex flex-column align-items-end gap-1">
              <div class="d-flex align-items-center gap-1">
                <input type="text" class="form-control form-control-sm"
                  style="width:130px; background-color:var(--background-color2); color:var(--text-color); border-color:var(--text-color2); text-align:center;"
                  [(ngModel)]="novoUsername" maxlength="20"
                  (keyup.enter)="salvarUsername()" (keyup.escape)="fecharEditarUsername()">
                <button class="btn btn-sm btn-success" style="font-size:12px; padding:2px 8px;" (click)="salvarUsername()">✓</button>
                <button class="btn btn-sm btn-secondary" style="font-size:12px; padding:2px 8px;" (click)="fecharEditarUsername()">✕</button>
              </div>
              @if (erroUsername) {
                <small style="color:#ff6b6b; font-size:11px; text-align:right; max-width:220px;">{{erroUsername}}</small>
              }
            </div>
          }
          -->
          <div class="sair" (click)="abrirModal()">
            <img src="logout.png" alt="logout">
            <p>logout</p>
          </div>
        </div>
      }
      <div *ngIf="isModalOpen" class="modal-overlay" (click)="fecharModal()">
        <div class="modal-content" (click)="$event.stopPropagation()">

            <h2>Deslogar</h2>
            <p>Tem certeza que deseja sair da sua conta?</p>

          <div class="modal-opcoes">
            <button class="btn btn-warning" (click)="logout()">Sair</button>
            <button class="btn btn-secondary" (click)="fecharModal()">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
    <!-- <button (click)="throwErro()"> throw error de proposito</button> -->
  </header>
  <!-- <div class="with-ng-content"> -->
  @if (seuAniversario) {
    <div class="aniversario-container">
      <div class="aniversario-content">
        <img src="boloaniversario.gif" width="100px">
        <p>Feliz Aniversário!!!</p>
        <img src="boloaniversario.gif" width="100px">
      </div>
    </div>
  }
  <div class="conteudo">
  <ng-content></ng-content>
  </div>
  <footer>
          <p class="text-center">Desenvolvido por <a href="https://gustavoksbr-portfolio-maker.vercel.app/portfolios/gustavoksbr" target="_blank">Gustavoksbr</a></p>
  </footer>
</div>
